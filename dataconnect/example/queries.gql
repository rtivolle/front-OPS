mutation CreatePublicWatch($movieId: UUID!, $watchDate: Date!) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  watch_insert(data: {movieId: $movieId, userId_expr: "uuidV4()", watchDate: $watchDate})
}

query ListPublicMovies @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  movies {
    id
    title
    year
    summary
    genres
  }
}

mutation AddMovieToList($listId: UUID!, $movieId: UUID!, $position: Int) @auth(level: USER) {
  listMovie_insert(data: {listId: $listId, movieId: $movieId, position: $position})
}

query GetMyLists @auth(level: USER) {
  lists(where: {userId: {eq_expr: "auth.uid"}}) {
    id
    name
    description
    isPublic
  }
}