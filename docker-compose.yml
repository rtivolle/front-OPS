services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_pass

  redis:
    image: redis:alpine
    restart: always

  app:
    build: ./nc-core
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_pass
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER:-admin}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD:-admin_pass}
      - NEXTCLOUD_TRUSTED_DOMAINS=web localhost
    depends_on:
      - db
      - redis

  setup-nc:
    build: ./nc-core
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - NEXTCLOUD_BOT_PASSWORD=${NEXTCLOUD_BOT_PASSWORD:-change-me}
    entrypoint: /usr/local/bin/setup-nextcloud.sh
    depends_on:
      - app

  cron:
    build: ./nc-core
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
    entrypoint: /bin/sh -c "while true; do php -f /var/www/html/cron.php; sleep 300; done"
    depends_on:
      - app

  web:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - nextcloud_data:/var/www/html:ro
      - ./nc-core/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  doc-worker:
    build: ./doc-worker
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - NEXTCLOUD_URL=http://web
      - NEXTCLOUD_USER=doc-bot
      - NEXTCLOUD_APP_PASSWORD=${NEXTCLOUD_BOT_PASSWORD:-change-me}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me}
      - STORAGE_PATH=/data
      - LOG_FORMAT=json
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    volumes:
      - doc_worker_data:/data
    depends_on:
      - redis
      - app
      - qdrant

  doc-worker-worker:
    build: ./doc-worker
    restart: always
    command: celery -A tasks.celery_app worker --loglevel=info -c 1
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    environment:
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_HOST=qdrant
      - NEXTCLOUD_URL=http://web
      - NEXTCLOUD_USER=doc-bot
      - NEXTCLOUD_APP_PASSWORD=${NEXTCLOUD_BOT_PASSWORD:-change-me}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-change-me}
      - STORAGE_PATH=/data
    volumes:
      - doc_worker_data:/data
    depends_on:
      - redis
      - app
      - qdrant

  qdrant:
    image: qdrant/qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  mongodb:
    image: mongo:6.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  db_data:
  nextcloud_data:
  doc_worker_data:
  qdrant_data:
  mongo_data:
