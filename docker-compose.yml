version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_pwd

  redis:
    image: redis:alpine
    restart: always

  nc-core:
    build: ./nc-core
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
      - ./nc-core/nextcloud.ini:/usr/local/etc/php/conf.d/nextcloud.ini:ro
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_pwd
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin_pwd
      - NEXTCLOUD_TRUSTED_DOMAINS=localhost
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  nc-web:
    image: nginx:alpine
    restart: always
    ports:
      - 8080:80
    volumes:
      - ./nc-core/nginx.conf:/etc/nginx/nginx.conf:ro
      - nextcloud_data:/var/www/html:ro
    depends_on:
      - nc-core

  nc-cron:
    build: ./nc-core
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
    entrypoint: /cron.sh
    depends_on:
      - nc-core

  doc-worker:
    build: ./doc-worker
    restart: always
    environment:
      - NEXTCLOUD_URL=http://nc-web
    depends_on:
      - nc-web

volumes:
  db_data:
  nextcloud_data:
