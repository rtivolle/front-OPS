services:
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_pass

  redis:
    image: redis:alpine
    restart: always

  app:
    build: ./nc-core
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
    environment:
      - POSTGRES_HOST=db
      - REDIS_HOST=redis
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud_pass
    depends_on:
      - db
      - redis

  web:
    image: nginx:alpine
    restart: always
    ports:
      - "8080:80"
    volumes:
      - nextcloud_data:/var/www/html:ro
      - ./nc-core/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app

  doc-worker:
    build: ./doc-worker
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NEXTCLOUD_URL=http://web
      - NEXTCLOUD_USER=doc-bot
      - NEXTCLOUD_APP_PASSWORD=change-me
      - WEBHOOK_SECRET=change-me
      - STORAGE_PATH=/data
    volumes:
      - doc_worker_data:/data
    depends_on:
      - redis
      - app

  doc-worker-worker:
    build: ./doc-worker
    restart: always
    command: celery -A tasks.celery_app worker --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
      - NEXTCLOUD_URL=http://web
      - NEXTCLOUD_USER=doc-bot
      - NEXTCLOUD_APP_PASSWORD=change-me
      - WEBHOOK_SECRET=change-me
      - STORAGE_PATH=/data
    volumes:
      - doc_worker_data:/data
    depends_on:
      - redis
      - app

volumes:
  db_data:
  nextcloud_data:
  doc_worker_data:
